function dispGrav(){const fr=parseFloat(S.fr),sat=parseFloat(S.sat),fala=S.dspEF.fala,cian=S.dspEF.cianose;let pts=0;if(S.fr&&(fr>30||fr<12))pts+=2;else if(S.fr&&fr>24)pts+=1;if(S.sat&&sat<90)pts+=2;else if(S.sat&&sat<94)pts+=1;if(fala==='Palavras soltas'||fala==='Impossível falar')pts+=2;else if(fala==='Frases incompletas')pts+=1;if(cian==='Central (lábios/língua)')pts+=2;if(pts>=4)return'grave';if(pts>=2)return'mod';return'leve';}
function dispGravBadge(){if(S.queixa!=='Dispneia')return'';const hasData=S.fr||S.sat||S.dspEF.fala||S.dspEF.cianose;if(!hasData)return'';const g=dispGrav();const[cls,ico,txt]=g==='grave'?['grav-grave','ti-alert-triangle','Gravidade sugerida: GRAVE — IOT/VNI considerar imediatamente']:g==='mod'?['grav-mod','ti-alert-circle','Gravidade sugerida: MODERADA — monitorização intensa, O2 alto fluxo']:['grav-leve','ti-info-circle','Gravidade sugerida: LEVE — tratar e reavaliar'];return`<div class="grav-badge ${cls}"><i class="ti ${ico}" aria-hidden="true"></i> ${txt}</div>`;}
function s3(){const isDsp=S.queixa==='Dispneia';const badge=isDsp?dispGravBadge():'';return`${badge}<div class="card"><div class="st"><i class="ti ti-search" aria-hidden="true"></i> Tipo de exame físico</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem"><button class="xbtn ${S.ef==='amb'?'on':''}" onclick="S.ef='amb';render()"><i class="ti ti-walk" aria-hidden="true"></i> Ambulatorial</button><button class="xbtn ${S.ef==='crit'?'on':''}" onclick="S.ef='crit';render()"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Paciente crítico (ABCDE)</button></div></div>${S.ef==='amb'?`<div class="card"><div class="st">Padrão ambulatorial</div>${[['g','Geral'],['cv','AP Cardiovascular'],['re','AP Respiratório'],['ab','Abdome'],['ne','Neurológico'],['pe','Pele e MMII']].map(([k,l])=>`<div style="margin-bottom:10px"><label>${l}</label><input type="text" value="${esc(S.amb[k])}" oninput="S.amb['${k}']=this.value" placeholder="${l}..."></div>`).join('')}</div>`:''}${S.ef==='crit'?`<div class="card"><div class="st">ABCDE — Avaliação primária</div>${abcH()}</div>`:''}${S.ef&&QX_EF[S.queixa]?QX_EF[S.queixa]():''}${S.ef?rECG()+''+rPOCUS():''}<div class="nav"><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar</button>${S.ef?`<button class="btnp" onclick="nx()">Impressão / Conduta <i class="ti ti-arrow-right" aria-hidden="true"></i></button>`:''}</div>`;}

function rCSec(sid,sec){const items=sec.it||[];const pc=items.filter((_,i)=>S.chk[sid+'_'+sec.id+'_'+i]==='pend').length;const dc=items.filter((_,i)=>S.chk[sid+'_'+sec.id+'_'+i]==='done').length;const alertsHtml=(sec.alerts||[]).map(a=>`<div class="abox aw" style="margin-bottom:6px;font-size:12px"><i class="ti ti-alert-triangle" aria-hidden="true"></i> ${a}</div>`).join('');return`<div class="csec"><div class="csh" onclick="tog('cs${sec.id}')"><span>${sec.t}</span><div style="display:flex;gap:5px;align-items:center">${dc?`<span class="sb sok" style="font-size:11px">${dc}✓</span>`:''}${pc?`<span class="sb smod" style="font-size:11px">${pc}⏳</span>`:''}<i class="ti ti-chevron-down" aria-hidden="true"></i></div></div><div class="csb open" id="cs${sec.id}">${alertsHtml}${items.map((item,idx)=>{const k=sid+'_'+sec.id+'_'+idx;const cl=ccls(k);return`<div class="chk ${cl}" onclick="cyc('${k}')"><div class="cico"><i class="ti ${cico(k)}" aria-hidden="true"></i></div><div class="ctx">${item}</div></div>`;}).join('')}<div style="margin-top:8px"><label style="margin-bottom:3px;display:block;font-size:12px;color:var(--color-text-secondary)">Observações desta seção:</label><textarea style="min-height:45px;font-size:13px" placeholder="Particularidades do caso..." oninput="S.nts['${sid}_${sec.id}']=this.value">${esc(S.nts[sid+'_'+sec.id]||'')}</textarea></div></div></div>`;}

function s4(){const T=S.sind?CT[S.sind]:null;const hasExcl=T&&T.subExcl;const hasAdd=T&&T.subAdd;return`<div class="card"><div class="st"><i class="ti ti-clipboard-check" aria-hidden="true"></i> Impressão clínica e síndrome</div><div style="margin-bottom:12px"><label>Impressão clínica livre</label><textarea oninput="S.imp=this.value" placeholder="Descreva sua impressão diagnóstica...">${esc(S.imp)}</textarea></div><div class="sl">Síndrome clínica suspeita:</div><div class="sgrid">${SLIST.map(s=>`<button class="xbtn ${S.sind===s.id?'on':''}" onclick="S.sind=S.sind==='${s.id}'?null:'${s.id}';S.chk={};S.nts={};S.subsind=null;S.subsinds=[];render()">${s.l}</button>`).join('')}</div></div>${T?rSindBlock(S.sind):''}${hasExcl?`<div class="card"><div class="st"><i class="ti ti-git-branch" aria-hidden="true"></i> ${S.sind==='dtx'?'Probabilidade clínica:':'Subtipo clínico:'}</div><div class="sgrid">${T.subExcl.map(s=>`<button class="xbtn ${S.subsind===s.id?'on':''}" onclick="selSub('${s.id}')">${s.l}</button>`).join('')}</div></div>`:''}${hasExcl&&S.subsind&&CT[S.subsind]?rSindBlock(S.subsind):''}${hasAdd?`<div class="card"><div class="st"><i class="ti ti-list-tree" aria-hidden="true"></i> ${S.sind==='dtx'?'Diagnósticos diferenciais (em ordem de gravidade):':'Subsíndromes presentes:'}</div><div class="sgrid">${T.subAdd.map(s=>`<button class="xbtn ${S.subsinds.includes(s.id)?'on':''}" onclick="toggleSub('${s.id}')">${s.l}</button>`).join('')}</div></div>`:''}${hasAdd?S.subsinds.filter(sid=>CT[sid]).map(sid=>rSindBlock(sid)).join(''):''}<div class="nav"><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar</button><button class="btnp" onclick="nx()">Gerar relatório <i class="ti ti-file-text" aria-hidden="true"></i></button></div>`;}

function gRel(){
 const g=gcs(),isDT=S.queixa==='Dor torácica';
 let origText;
 if(['Vaga Zero','Transferência'].includes(S.orig)){
 origText=`proveniente de ${S.orig.toLowerCase()}${S.origInst?' da instituição '+S.origInst:''}${S.origMotivo?' por motivo de '+S.origMotivo:''}`;
 }else{origText=`via ${S.orig}`;}
 let hda=`Paciente admitido(a) ${origText}, com queixa de ${S.queixa}${S.queixa==='Intoxicação exógena'&&S.itDrug?' (substâncias suspeitas: '+S.itDrug+')':''}`;
 if(S.tempo)hda+=`, com início há ${S.tempo}`;
 if(QX_HDA[S.queixa])hda+=QX_HDA[S.queixa](S);
 else if(S.caract.length)hda+=`. ${S.caract.join(', ').toLowerCase()}`;
 hda+='.';
 let ef='';
 if(S.ef==='amb'){ef=`Geral: ${S.amb.g||'—'} | CV: ${S.amb.cv||'—'} | Resp: ${S.amb.re||'—'} | Abd: ${S.amb.ab||'—'} | Neuro: ${S.amb.ne||'—'} | Pele: ${S.amb.pe||'—'}`;}
 else if(S.ef==='crit'){const a=S.abc;ef=`A: VA ${a.va.toLowerCase()}, fonação ${a.fon.toLowerCase()}. Colar: ${a.col.toLowerCase()}.\nB: Expansibilidade ${a.exp.toLowerCase()}, MV ${a.mv.toLowerCase()}. ${a.esf.join(', ')||'—'}. Ruídos: ${a.rud.join(', ')||'ausentes'}.\nC: TEC ${a.tec}. ${a.aus.join(', ')||'—'}. Pulsos ${a.pul.toLowerCase()}. Abdome: ${a.abd.join(', ')||'—'}.\nD: GCS ${g}/15 (O:${a.ao} V:${a.rv} M:${a.rm}) — ${gcsL(g)}. Pupilas ${a.pup.toLowerCase()}. Déficits: ${a.def.join(', ')||'ausentes'}.\nE: Edema MMII ${a.ede.toLowerCase()}${a.ede==='Presente'?' ('+a.cac.toLowerCase()+')':''}. Pele: ${a.pel.join(', ')||'sem alterações'}.`;}
 if(QX_EF_TEXT[S.queixa]){const extra=QX_EF_TEXT[S.queixa](S);if(extra)ef+=(ef?'\n':'')+extra;}
 let sc='';
 if(isDT){sc=`\n${'='.repeat(40)}\nSCORES PREDITIVOS\nHEAR: ${hSc()}/10 — ${hI(hSc())}\nEDACS: ${eSc()} pts — ${eI()}${S.edacs.t0||S.edacs.t2?'\n Troponina 0h: '+(S.edacs.t0||'—')+' | 2h: '+(S.edacs.t2||'—'):''}`;}
 let ct='';
 const T=S.sind?CT[S.sind]:null;
 let subLabel='';
 if(T&&T.subExcl&&S.subsind){const sx=T.subExcl.find(x=>x.id===S.subsind);if(sx)subLabel+=` (${sx.l.toLowerCase()})`;}
 if(T&&T.subAdd&&S.subsinds.length){const labels=S.subsinds.map(id=>{const sa=T.subAdd.find(x=>x.id===id);return sa?sa.l:'';}).filter(Boolean);if(labels.length)subLabel+=`\nDiferenciais considerados: ${labels.join(', ')}`;}
 if(T){
 const pd=[],dn=[];
 const collect=(sid,sindObj)=>{sindObj.s.forEach(sec=>{const pi=sec.it.filter((_,i)=>S.chk[sid+'_'+sec.id+'_'+i]==='pend');const di=sec.it.filter((_,i)=>S.chk[sid+'_'+sec.id+'_'+i]==='done');const nt=S.nts[sid+'_'+sec.id]||'';if(pi.length)pd.push({src:sindObj.l,t:sec.t,it:pi,nt});if(di.length)dn.push({src:sindObj.l,t:sec.t,it:di,nt});});};
 collect(S.sind,T);
 if(T.subExcl&&S.subsind&&CT[S.subsind])collect(S.subsind,CT[S.subsind]);
 if(T.subAdd)S.subsinds.forEach(id=>{if(CT[id])collect(id,CT[id]);});
 ct=`\n${'='.repeat(40)}\nIMPRESSÃO E CONDUTA\nSíndrome: ${T.l}${subLabel}`;
 if(S.imp)ct+=`\nImpressão: ${S.imp}`;
 const fmt=arr=>arr.map(s=>`\n[${s.src}] ${s.t.toUpperCase()}:\n`+s.it.map(x=>` - ${x}`).join('\n')+(s.nt?`\n Obs: ${s.nt}`:'')).join('');
 if(pd.length)ct+=`\n\n⏳ PENDENTES:${fmt(pd)}`;
 if(dn.length)ct+=`\n\n✓ REALIZADAS:${fmt(dn)}`;
 }else if(S.imp)ct=`\n${'='.repeat(40)}\nIMPRESSÃO CLÍNICA\n${S.imp}`;
 const va=vA();
 const extraHpp=QX_HPP[S.queixa]?QX_HPP[S.queixa](S):[];
 const allHpp=[...S.hpp,...extraHpp];
 return`## ADMISSÃO EM SALA DE EMERGÊNCIA ##\n${'='.repeat(40)}\nNome: ${S.nome||'Não informado'} | Idade: ${S.idade} anos | Origem: ${S.orig}${['Vaga Zero','Transferência'].includes(S.orig)&&(S.origInst||S.origMotivo)?' ('+[S.origInst,S.origMotivo].filter(Boolean).join(' / ')+')':''}\n${'='.repeat(40)}\nHDA\n${hda}\n${'='.repeat(40)}\nANTECEDENTES\nHPP: ${allHpp.join(', ')||'Nega'} | MUC: ${S.muc||'Nega'} | Alergias: ${S.ale}${S.tab||S.etil||S.drog?'\nHábitos: '+[S.tab&&'Tabagismo: '+S.tab,S.etil&&'Etilismo: '+S.etil,S.drog&&'Drogas: '+S.drog].filter(Boolean).join(' | ') :''}\n${'='.repeat(40)}\nSINAIS VITAIS\nFC: ${S.fc||'—'} bpm | SatO2: ${S.sat||'—'}% | PA: ${S.pa||'—'} mmHg | FR: ${S.fr||'—'} irpm | Temp: ${S.temp||'—'}°C | Gli: ${S.gli||'—'} mg/dL${S.peso?' | Peso: '+S.peso+' kg':''}${S.eva!==''&&S.eva!==null?' | EVA: '+S.eva+'/10':''}${va.length?'\n⚠ ALERTAS: '+va.join(' | '):''}\n${'='.repeat(40)}\nEXAME FÍSICO (${S.ef==='amb'?'Ambulatorial':S.ef==='crit'?'Crítico ABCDE':'não selecionado'})\n${ef}${sc}\n${'='.repeat(40)}\nECG\n${buildEcgText()}\n${'='.repeat(40)}\nPOCUS\n${buildPocText()}${ct}\n${'='.repeat(40)}`;}

function gResumo(){
 const T=S.sind?CT[S.sind]:null;
 const now=new Date().toLocaleString('pt-BR');
 const id=`${S.nome||'Paciente'}, ${S.idade}a`;
 const queixa=S.queixa||'sem queixa registrada';
 const tempo=S.tempo?` há ${S.tempo}`:'';
 const va=vA();
 const vitais=`FC ${S.fc||'—'} | Sat ${S.sat||'—'}% | PA ${S.pa||'—'} | FR ${S.fr||'—'} | T ${S.temp||'—'}°C${va.length?' ⚠ '+va.join('; '):''}`;
 let dx='(sem hipótese)';
 if(T){
 let sub='';
 if(T.subExcl&&S.subsind){const sx=T.subExcl.find(x=>x.id===S.subsind);if(sx)sub+=` (${sx.l.toLowerCase()})`;}
 if(T.subAdd&&S.subsinds.length){const labs=S.subsinds.map(id=>{const sa=T.subAdd.find(x=>x.id===id);return sa?sa.l:'';}).filter(Boolean);if(labs.length)sub+=` + dif: ${labs.join(', ')}`;}
 dx=T.l+sub;
 }
 const imp=S.imp?` — ${S.imp.length>120?S.imp.slice(0,117)+'...':S.imp}`:'';
 const pendList=[];
 const collectPend=(sid,sindObj)=>{if(!sindObj)return;sindObj.s.forEach(sec=>{sec.it.forEach((it,i)=>{if(S.chk[sid+'_'+sec.id+'_'+i]==='pend')pendList.push(it);});});};
 if(T){collectPend(S.sind,T);if(T.subExcl&&S.subsind&&CT[S.subsind])collectPend(S.subsind,CT[S.subsind]);if(T.subAdd)S.subsinds.forEach(id=>{if(CT[id])collectPend(id,CT[id]);});}
 const pTop=pendList.slice(0,3).map(p=>p.length>90?p.slice(0,87)+'...':p);
 const pendStr=pendList.length?`Pendentes (${pendList.length})${pendList.length>3?', top 3':''}:\n - ${pTop.join('\n - ')}`:'Pendentes: nenhum item marcado';
 return `RESUMO DE PLANTÃO (${now})\n${id} — ${queixa}${tempo}\nVitais: ${vitais}\nDx: ${dx}${imp}\n${pendStr}`;
}
function pSumH(){const T=S.sind?CT[S.sind]:null;if(!T)return'';const pd=T.s.filter(sec=>sec.it.some((_,i)=>S.chk[S.sind+'_'+sec.id+'_'+i]==='pend'));if(!pd.length)return'';return`<div class="psm" style="margin-bottom:12px"><span class="psml"><i class="ti ti-clock" aria-hidden="true"></i> Pendências:</span>${pd.map(s=>{const n=s.it.filter((_,i)=>S.chk[S.sind+'_'+s.id+'_'+i]==='pend').length;return`<span class="psmb">${s.t}: ${n}</span>`;}).join('')}</div>`;}

function s5(){return`<div class="card"><div class="st"><i class="ti ti-file-text" aria-hidden="true"></i> Relatório de admissão</div>${pSumH()}${QX_BADGE[S.queixa]?QX_BADGE[S.queixa]():''}<div class="rg" style="margin-bottom:10px"><span class="ro ${S.relMode==='full'?'on':''}" onclick="S.relMode='full';render()"><i class="ti ti-file-text" aria-hidden="true"></i> Completo</span><span class="ro ${S.relMode==='resumo'?'on':''}" onclick="S.relMode='resumo';render()"><i class="ti ti-list" aria-hidden="true"></i> Resumo de plantão</span></div><div class="relbox" id="relTxt"></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btng" onclick="navigator.clipboard.writeText(document.getElementById('relTxt').textContent).then(()=>showToast('Copiado!'))"><i class="ti ti-copy" aria-hidden="true"></i> Copiar</button><button class="btng" style="background:#185fa5" onclick="saveReport(document.getElementById('relTxt').textContent)"><i class="ti ti-device-floppy" aria-hidden="true"></i> Salvar</button><button class="btns" onclick="showSaved()"><i class="ti ti-history" aria-hidden="true"></i> Ver salvos</button><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Editar</button></div></div>`;}

function render(){rs();const c=document.getElementById('con');if(S.step===0)c.innerHTML=s0();else if(S.step===1)c.innerHTML=s1();else if(S.step===2)c.innerHTML=s2();else if(S.step===3)c.innerHTML=s3();else if(S.step===4)c.innerHTML=s4();else{c.innerHTML=s5();const rt=document.getElementById('relTxt');if(rt)rt.textContent=S.relMode==='resumo'?gResumo():gRel();}if(typeof autoSave==='function')autoSave();}
initAuth();
</script>
</body>
</html>
