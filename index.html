<style>

body{background:#f3f4f6;font-family:var(--font-sans);color:var(--color-text-primary)}
input,select,textarea{padding:7px 10px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);outline:none;transition:border-color .15s;box-sizing:border-box}

.login-overlay{position:fixed;inset:0;background:#f3f4f6;display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.login-box{background:#fff;border-radius:12px;padding:2rem;width:100%;max-width:360px;border:.5px solid #e5e7eb;box-shadow:0 4px 24px rgba(0,0,0,.08)}

.login-hico i{font-size:22px;color:#a32d2d}
.login-fl{margin-bottom:12px}
.login-fl label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.login-fl input{width:100%;padding:9px 12px;border:.5px solid #d1d5db;border-radius:8px;font-size:14px}
.login-btn{width:100%;padding:10px;background:#a32d2d;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;font-family:inherit}
.login-btn:hover{background:#791f1f}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{color:#a32d2d;font-size:12px;margin-top:8px;display:none}
.login-loading{text-align:center;color:#6b7280;font-size:12px;padding:6px 0;display:none}
.logout-btn{padding:6px 12px;background:#fcebeb;border:.5px solid #f09595;color:#a32d2d;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;margin-left:auto}
.logout-btn:hover{background:#fad4d4}

<body>
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-hico"><i class="ti ti-building-hospital" aria-hidden="true"></i></div>
      <div>
        <div style="font-size:18px;font-weight:600;color:#111827">Emergência Pro</div>
        <div style="font-size:12px;color:#6b7280">Acesso restrito</div>
      </div>
    </div>
    <div class="login-fl">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-fl">
      <label>Senha</label>
      <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()" id="loginBtn">Entrar</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-loading" id="loginLoading">Verificando...</div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
<div class="hdr">
  <div class="hico"><i class="ti ti-building-hospital" aria-hidden="true"></i></div>
  <div><div style="font-size:18px;font-weight:500">Emergência Pro</div><div style="font-size:13px;color:var(--color-text-secondary)">Admissão com condutas baseadas em evidências</div></div>
  <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout" aria-hidden="true"></i> Sair</button>
</div>
<div class="steps" id="sBar"></div>
<div id="con"></div>
<div id="modalArea"></div>
</div>
<script>

// ─── Supabase config ───────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://vysgohdcvtresrszvdft.supabase.co';
const SUPABASE_ANON_KEY = 'COLE_SUA_CHAVE_ANON_AQUI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── Auth ──────────────────────────────────────────────────────────────────
async function initAuth(){
  const {data:{session}} = await sb.auth.getSession();
  if(session) showApp(); else showLoginScreen();
  sb.auth.onAuthStateChange((_,s)=>{if(s)showApp();else showLoginScreen();});
}

function showApp(){
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('mainApp').style.display='block';
  render();
}
function showLoginScreen(){
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('mainApp').style.display='none';
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pwd=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginErr');
  const loadEl=document.getElementById('loginLoading');
  const btn=document.getElementById('loginBtn');
  errEl.style.display='none';
  loadEl.style.display='block';
  btn.disabled=true;
  const {error}=await sb.auth.signInWithPassword({email,password:pwd});
  loadEl.style.display='none';
  btn.disabled=false;
  if(error){
    const msg=error.message==='Invalid login credentials'?'E-mail ou senha incorretos':error.message;
    errEl.textContent=msg;errEl.style.display='block';
  }
}

async function doLogout(){
  await sb.auth.signOut();
}

oca:{l:'Dor torácica — suspeita para OCA (NSTE-ACS)',s:[

iams:{l:'IAM com SUPRA / OCA estabelecida',s:[
{id:'m',t:'Ativação e monitorização',it:[

{id:'f',t:'Farmacológico',it:[

sep:{l:'Sepse / Choque séptico',s:[

hdg:{l:'Hemorragia digestiva',s:[

neu:{l:'Síndrome neurovascular (AVC/AIT)',s:[

rnc:{l:'Rebaixamento do nível de consciência',s:[

// helpers
function ts(arr,v){const i=arr.indexOf(v);if(i>-1)arr.splice(i,1);else arr.push(v);render();}
function tog(id){const b=document.getElementById(id);if(b)b.classList.toggle('open');}
function cyc(k){const c=S.chk[k];if(!c)S.chk[k]='done';else if(c==='done')S.chk[k]='pend';else delete S.chk[k];render();}
function cico(k){const c=S.chk[k];return c==='done'?'ti-check':c==='pend'?'ti-clock':'ti-minus';}
function ccls(k){const c=S.chk[k];return c==='done'?'done':c==='pend'?'pend':'';}
function chAge(){const a=S.idade;return a<45?0:a<65?1:2;}
function hSc(){let t=chAge();const h=S.hear;if(h.h!==null)t+=+h.h;if(h.e!==null)t+=+h.e;if(h.r!==null)t+=+h.r;if(h.t!==null)t+=+h.t;return t;}
function hC(){const n=hSc();return n<=3?'sok':n<=6?'smod':'sgr';}
function hI(n){if(n<=3)return'Baixo risco — alta precoce considerável';if(n<=6)return'Risco intermediário — observação e reteste';return'Alto risco — hospitalização e estratégia invasiva';}
function eAP(){const a=S.idade,m=S.edacs.sx==='M';if(m){if(a<45)return 2;if(a<=50)return 4;if(a<=55)return 6;if(a<=60)return 8;if(a<=65)return 10;if(a<=70)return 12;if(a<=75)return 14;if(a<=80)return 16;if(a<=85)return 18;return 20;}else{if(a<45)return 0;if(a<=50)return 3;if(a<=55)return 5;if(a<=60)return 7;if(a<=65)return 9;if(a<=70)return 11;if(a<=75)return 13;if(a<=80)return 15;if(a<=85)return 17;return 19;}}
function eSc(){const e=S.edacs;let p=eAP();if(e.cad)p+=4;if(e.dia)p+=3;if(e.rad)p+=5;if(e.ins)p-=4;if(e.pal)p-=6;return p;}
function eC(){return eSc()<16?'sok':'sgr';}
function eI(){const p=eSc(),t0=parseFloat(S.edacs.t0),t2=parseFloat(S.edacs.t2);const d=!isNaN(t0)&&!isNaN(t2)?Math.abs(t2-t0):null;if(p<16&&d!==null&&d<3&&t0<16&&t2<16)return'Baixo risco — candidato a descarte acelerado em 2h';if(p<16)return'EDACS < 16 — aguardar troponina seriada';return'EDACS ≥ 16 — risco não baixo, observação';}
function vC(k,v){const n=parseFloat(v);if(!v)return'vok';if(k==='fc')return(n<40||n>130)?'vc':(n<60||n>100)?'vw':'vok';if(k==='sat')return n<90?'vc':n<95?'vw':'vok';if(k==='fr')return(n<8||n>30)?'vc':(n<12||n>20)?'vw':'vok';if(k==='gli')return n<60?'vc':n<70||n>200?'vw':'vok';if(k==='pa'&&v){const s=parseFloat(v.split('/')[0]);return s<90?'vc':s>180?'vw':'vok';}return'vok';}
function vA(){const a=[],fc=parseFloat(S.fc),sat=parseFloat(S.sat),fr=parseFloat(S.fr);if(S.fc&&(fc>120||fc<40))a.push('FC crítica');if(S.sat&&sat<90)a.push('Sat < 90%');if(S.fr&&(fr>30||fr<8))a.push('FR crítica');if(S.pa){const s=parseFloat(S.pa.split('/')[0]);if(s<90)a.push('Hipotensão');if(s>180)a.push('HAS grave');}return a;}
function vBH(){return[{k:'fc',l:'FC',v:S.fc},{k:'sat',l:'Sat',v:S.sat},{k:'pa',l:'PA',v:S.pa},{k:'fr',l:'FR',v:S.fr},{k:'gli',l:'Glic',v:S.gli}].map(x=>`<div class="vbar ${vC(x.k,x.v)}">${x.l}<br><strong>${x.v||'—'}</strong></div>`).join('');}
function uvb(){const b=document.getElementById('vbars');if(b)b.innerHTML=vBH();}
function gcs(){return+S.abc.ao+ +S.abc.rv+ +S.abc.rm;}
function gcsC(n){return n>=14?'sok':n>=9?'smod':'sgr';}
function gcsL(n){return n>=14?'Leve':n>=9?'Moderado':'Grave';}
function cAge(d){S.idade=Math.min(110,Math.max(0,S.idade+d));render();}
function rs(){document.getElementById('sBar').innerHTML=STEPS.map((s,i)=>`<div class="step ${i===S.step?'active':i<S.step?'done':''}" onclick="if(${i}<=${S.step})gs(${i})"><i class="ti ${i<S.step?'ti-check':s.i}" aria-hidden="true"></i>${s.l}</div>`).join('');}
function gs(n){S.step=n;render();}
function nx(){if(S.step<5){S.step++;render();}}
function pv(){if(S.step>0){S.step--;render();}}

// storage — Supabase
async function saveReport(txt){
  try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user){showToast('Faça login para salvar',false);return;}
    const {error}=await sb.from('reports').insert({
      key:'rel_'+Date.now(),
      nome:S.nome||'Sem nome',
      queixa:S.queixa||'—',
      report_date:new Date().toLocaleString('pt-BR'),
      txt
    });
    if(error)throw error;
    showToast('Relatório salvo com sucesso!');
  }catch(e){showToast('Erro ao salvar: '+e.message,false);}
}
function showToast(msg,ok=true){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:20px;right:20px;background:${ok?'#3b6d11':'#a32d2d'};color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}
async function loadSaved(){
  try{
    const {data,error}=await sb.from('reports').select('*').order('created_at',{ascending:false});
    if(error)throw error;
    return(data||[]).map(r=>({key:r.key,data:{date:r.report_date,nome:r.nome,queixa:r.queixa,txt:r.txt}}));
  }catch(e){return[];}
}
async function showSaved(){
  const items=await loadSaved();
  const modal=document.getElementById('modalArea');
  if(!items.length){modal.innerHTML=`<div class="modal-bg" onclick="this.remove()"><div class="modal"><div class="modal-hdr"><strong>Relatórios salvos</strong><button class="modal-close" onclick="document.getElementById('modalArea').innerHTML=''">×</button></div><div style="color:var(--color-text-secondary);font-size:14px">Nenhum relatório salvo ainda.</div></div></div>`;return;}
  const list=items.sort((a,b)=>b.key.localeCompare(a.key)).map(x=>`<div class="saved-item" onclick="showRel(${JSON.stringify(x.data.txt).replace(/'/g,'&#39;')})"><div class="si-top"><div class="si-name">${x.data.nome}</div><div class="si-date">${x.data.date}</div></div><div class="si-preview">${x.data.queixa}</div></div>`).join('');
  modal.innerHTML=`<div class="modal-bg"><div class="modal"><div class="modal-hdr"><strong>Relatórios salvos</strong><button class="modal-close" onclick="document.getElementById('modalArea').innerHTML=''">×</button></div>${list}</div></div>`;
}
function showRel(txt){
  document.getElementById('modalArea').innerHTML=`<div class="modal-bg"><div class="modal"><div class="modal-hdr"><strong>Relatório</strong><button class="modal-close" onclick="document.getElementById('modalArea').innerHTML=''">×</button></div><div class="relbox">${txt}</div><button class="btng" onclick="navigator.clipboard.writeText(${JSON.stringify(txt)}).then(()=>showToast('Copiado!'))"><i class='ti ti-copy' aria-hidden='true'></i> Copiar</button></div></div>`;
}

function rHear(){const H=S.hear;const aL=S.idade<45?'< 45a (0)':S.idade<65?'45–64a (1)':'≥ 65a (2)';const it=[{k:'h',l:'H — História',d:'Alt. suspeita=2 / Moderada=1 / Leve=0',o:[['0','Leve'],['1','Moderada'],['2','Alt. suspeita']]},{k:'e',l:'E — ECG',d:'Normal=0 / Inespecífico=1 / Isquemia nova=2',o:[['0','Normal'],['1','Inespec.'],['2','Isquemia']]},{k:'r',l:'R — Fatores de risco',d:'Sem FR=0 / 1–2=1 / ≥3 ou DAC=2',o:[['0','Sem FR'],['1','1–2 FR'],['2','≥3 FR']]},{k:'t',l:'T — Troponina',d:'≤ limite=0 / 1–3×=1 / >3×=2',o:[['0','Normal'],['1','1–3×'],['2','>3×']]}];return`<div class="srow"><div style="flex:1"><div class="slbl">A — Idade</div><div class="sdsc">Auto calculado</div></div><div class="sopts"><span class="sopt auto">${aL}</span></div></div>`+it.map(x=>`<div class="srow"><div style="flex:1"><div class="slbl">${x.l}</div><div class="sdsc">${x.d}</div></div><div class="sopts">${x.o.map(([v,lb])=>`<span class="sopt ${H[x.k]==v?'on':''}" onclick="S.hear['${x.k}']='${v}';render()">${lb} (${v})</span>`).join('')}</div></div>`).join('');}
function rEdacs(){const e=S.edacs,ap=eAP();return`<div class="srow"><div style="flex:1"><div class="slbl">Idade / Sexo</div><div class="sdsc">Auto calculado (${S.idade} anos)</div></div><div style="display:flex;align-items:center;gap:6px"><span class="sopt auto">${ap} pts</span><div style="display:flex;gap:5px">${[['M','Masc'],['F','Fem']].map(([v,l])=>`<span class="sopt ${e.sx===v?'on':''}" onclick="S.edacs.sx='${v}';render()">${l}</span>`).join('')}</div></div></div>`+[{k:'cad',l:'DAC conhecida',d:'+4'},{k:'dia',l:'Diaforese',d:'+3'},{k:'rad',l:'Irradiação braço/ombro',d:'+5'},{k:'ins',l:'Piora à inspiração',d:'−4'},{k:'pal',l:'Reproduzida à palpação',d:'−6'}].map(x=>`<div class="srow"><div style="flex:1"><div class="slbl">${x.l}</div><div class="sdsc">${x.d} pts</div></div><div class="sopts">${[['true','Sim'],['false','Não']].map(([v,lb])=>`<span class="sopt ${String(e[x.k])===v?'on':''}" onclick="S.edacs['${x.k}']=${v};render()">${lb}</span>`).join('')}</div></div>`).join('')+`<div class="srow"><div style="flex:1"><div class="slbl">Troponina 0h / 2h</div></div><div style="display:flex;gap:5px"><input type="number" value="${e.t0}" oninput="S.edacs.t0=this.value;render()" style="width:62px" placeholder="0h"><input type="number" value="${e.t2}" oninput="S.edacs.t2=this.value;render()" style="width:62px" placeholder="2h"></div></div>`;}

function rDT(){return`<div class="card"><div class="st"><i class="ti ti-activity" aria-hidden="true"></i> Características da dor torácica</div><div class="sl">Início</div><div class="rg">${['Súbito','Progressivo'].map(v=>`<span class="ro ${S.dt.ini===v?'on':''}" onclick="S.dt.ini='${v}';render()">${v}</span>`).join('')}</div><div class="sl">Qualidade</div><div class="tags">${['Opressiva','Pleurítica','Em facada','Queimação','Em aperto','Difusa'].map(v=>`<span class="tag ${S.caract.includes(v)?'on':''}" onclick="ts(S.caract,'${v}')">${v}</span>`).join('')}</div><div class="sl">Irradiação</div><div class="tags">${['MMSS esquerdo','MMSS direito','Bilateral','Cervical/mandibular','Dorso/interescapular','Abdominal'].map(v=>`<span class="tag ${S.dt.irr.includes(v)?'on':''}" onclick="ts(S.dt.irr,'${v}')">${v}</span>`).join('')}</div><div class="sl">Fatores modificadores</div><div class="tags">${['Piora ao esforço','Melhora com repouso','Piora ao decúbito','Piora com inspiração','Piora com movimento','Melhora com nitrato'].map(v=>`<span class="tag ${S.caract.includes(v)?'on':''}" onclick="ts(S.caract,'${v}')">${v}</span>`).join('')}</div><hr class="dvd"><div class="r2" style="margin-top:8px"><div><div class="sl">Semelhante a evento prévio?</div><div class="rg">${['Sim','Não','Sem evento prévio'].map(v=>`<span class="ro ${S.dt.sem===v?'on':''}" onclick="S.dt.sem='${v}';render()">${v}</span>`).join('')}</div></div><div><div class="sl">Pior à palpação?</div><div class="rg">${['Sim','Não'].map(v=>`<span class="ro ${S.dt.pal===v?'on':''}" onclick="S.dt.pal='${v}';render()">${v}</span>`).join('')}</div></div></div><hr class="dvd"><div class="sl">Sintomas associados</div><div class="tags">${['Dispneia','Sudorese','Náuseas/Vômitos','Pré-síncope','Palpitações','Cefaleia','Parestesia MMSS','Parestesia perioral','Parestesia MMII','Febre','Tosse','Hemoptise'].map(v=>`<span class="tag ${S.dt.sin.includes(v)?'on':''}" onclick="ts(S.dt.sin,'${v}')">${v}</span>`).join('')}</div>${(S.dt.sin.includes('Parestesia perioral')||S.dt.sin.includes('Parestesia MMSS'))&&S.dt.ini==='Súbito'?`<div class="abox aw"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Considerar etiologia neurológica ou hiperventilação</div>`:''}${S.dt.irr.includes('Dorso/interescapular')?`<div class="abox aw"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Irradiação para dorso — excluir dissecção aórtica</div>`:''}<hr class="dvd"><label>Tempo de início</label><input type="text" value="${S.tempo}" oninput="S.tempo=this.value" placeholder="Ex: 2 horas, 30 min" style="margin-top:4px"></div><div class="scard"><div class="shdr" onclick="tog('hb')"><span style="font-weight:500">Score HEAR</span><span class="sb ${hC()}">${hSc()}/10</span></div><div class="sbd open" id="hb">${rHear()}<div class="sres"><div class="snum">${hSc()}<span style="font-size:13px;color:var(--color-text-secondary)">/10</span></div><div><span class="sb ${hC()}">${hI(hSc())}</span></div></div></div></div><div class="scard"><div class="shdr" onclick="tog('eb')"><span style="font-weight:500">Score EDACS</span><span class="sb ${eC()}">${eSc()} pts</span></div><div class="sbd open" id="eb">${rEdacs()}<div class="sres"><div class="snum">${eSc()}<span style="font-size:13px;color:var(--color-text-secondary)"> pts</span></div><div style="font-size:13px">${eI()}</div></div></div></div>`;}

function s0(){return`<div class="card"><div class="st"><i class="ti ti-user" aria-hidden="true"></i> Identificação e origem</div><div style="margin-bottom:12px"><label>Nome do paciente</label><input type="text" value="${S.nome}" oninput="S.nome=this.value" placeholder="Nome completo"></div><div class="r2"><div><label>Idade</label><div class="age-ctrl"><button class="abtn" onclick="cAge(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button><div class="aged">${S.idade}<small>anos</small></div><button class="abtn" onclick="cAge(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button></div></div><div><label>Origem</label><select onchange="S.orig=this.value">${['Demanda Espontânea','SAMU','Bombeiros','Vaga Zero','Transferência'].map(o=>`<option ${S.orig===o?'selected':''}>${o}</option>`).join('')}</select></div></div></div><div class="nav"><div></div><button class="btnp" onclick="nx()">Próximo <i class="ti ti-arrow-right" aria-hidden="true"></i></button></div>`;}
function s1(){const al=ALERTAS[S.queixa],isDT=S.queixa==='Dor torácica',cm=CMAP[S.queixa]||['Início súbito','Progressivo','Persistente','Febre'];return`<div class="card"><div class="st"><i class="ti ti-stethoscope" aria-hidden="true"></i> Queixa principal</div>${!S.queixa?`<div class="qgrid">${QUEIXAS.map(q=>`<button class="qbtn" onclick="S.queixa=\`${q}\`;S.caract=[];S.dt={ini:'',sem:null,pal:null,irr:[],sin:[]};render()">${q}</button>`).join('')}</div>`:`<div class="selq"><span><i class="ti ti-check" aria-hidden="true"></i> ${S.queixa}</span><button onclick="S.queixa=null;render()">Mudar</button></div>${al?`<div class="abox ${al.c}"><i class="ti ti-alert-triangle" aria-hidden="true"></i> ${al.m}</div>`:''}${isDT?rDT():`<div class="sl">Características:</div><div class="tags">${cm.map(c=>`<span class="tag ${S.caract.includes(c)?'on':''}" onclick="ts(S.caract,\`${c}\`)">${c}</span>`).join('')}</div><div style="margin-top:10px"><label>Tempo de início</label><input type="text" value="${S.tempo}" oninput="S.tempo=this.value" placeholder="Ex: 2 horas, 30 min"></div>`}`}</div><div class="nav"><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar</button>${S.queixa?`<button class="btnp" onclick="nx()">Próximo <i class="ti ti-arrow-right" aria-hidden="true"></i></button>`:''}</div>`;}
function s2(){const va=vA();return`<div class="card"><div class="st"><i class="ti ti-heart-rate-monitor" aria-hidden="true"></i> Sinais vitais</div><div class="r5"><div><label>FC</label><input type="text" value="${S.fc}" oninput="S.fc=this.value;uvb()" placeholder="bpm"></div><div><label>SatO2</label><input type="text" value="${S.sat}" oninput="S.sat=this.value;uvb()" placeholder="%"></div><div><label>PA</label><input type="text" value="${S.pa}" oninput="S.pa=this.value;uvb()" placeholder="120/80"></div><div><label>FR</label><input type="text" value="${S.fr}" oninput="S.fr=this.value;uvb()" placeholder="irpm"></div><div><label>Glicemia</label><input type="text" value="${S.gli}" oninput="S.gli=this.value;uvb()" placeholder="mg/dL"></div></div><div class="vbars" id="vbars">${vBH()}</div>${va.length?`<div class="abox ad" style="margin-top:8px"><i class="ti ti-alert-circle" aria-hidden="true"></i> ${va.join(' | ')}</div>`:''}</div><div class="card"><div class="st"><i class="ti ti-clipboard-list" aria-hidden="true"></i> Antecedentes</div><div class="sl" style="margin-top:0">HPP:</div><div class="tags" style="margin-bottom:10px">${['HAS','DM2','ICC','AVC','DAC','IRC','DPOC','FA','Neo','Cirrose','HIV','Outras'].map(h=>`<span class="tag ${S.hpp.includes(h)?'on':''}" onclick="ts(S.hpp,'${h}')">${h}</span>`).join('')}</div><div class="r2"><div><label>Medicações em uso</label><input type="text" value="${S.muc}" oninput="S.muc=this.value" placeholder="Ex: Metoprolol, AAS"></div><div><label>Alergias</label><input type="text" value="${S.ale}" oninput="S.ale=this.value"></div></div></div><div class="nav"><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar</button><button class="btnp" onclick="nx()">Próximo <i class="ti ti-arrow-right" aria-hidden="true"></i></button></div>`;}
function abcH(){const a=S.abc,g=gcs();return`<div class="abcs"><div class="abch" onclick="tog('sa')"><strong>A</strong> — Via aérea <i class="ti ti-chevron-down" style="margin-left:auto" aria-hidden="true"></i></div><div class="abcb open" id="sa"><div class="sl">Estado:</div><div class="rg" style="margin-bottom:8px">${['Pérvia e Patente','Obstruída'].map(v=>`<span class="ro ${a.va===v?'on':''}" onclick="S.abc.va='${v}';render()">${v}</span>`).join('')}</div><div class="sl">Fonação:</div><div class="rg" style="margin-bottom:8px">${['Preservada','Prejudicada/Ausente'].map(v=>`<span class="ro ${a.fon===v?'on':''}" onclick="S.abc.fon='${v}';render()">${v}</span>`).join('')}</div><div class="sl">Colar cervical:</div><div class="rg">${['Não indicado','Colocado/Mantido'].map(v=>`<span class="ro ${a.col===v?'on':''}" onclick="S.abc.col='${v}';render()">${v}</span>`).join('')}</div>${a.va==='Obstruída'?`<div class="abox ad" style="margin-top:8px"><i class="ti ti-alert-circle" aria-hidden="true"></i> VA comprometida — manejo imediato</div>`:''}</div></div><div class="abcs"><div class="abch" onclick="tog('sb')"><strong>B</strong> — Respiração <i class="ti ti-chevron-down" style="margin-left:auto" aria-hidden="true"></i></div><div class="abcb open" id="sb"><div class="sl">Expansibilidade:</div><div class="rg" style="margin-bottom:8px">${['Simétrica','Assimétrica'].map(v=>`<span class="ro ${a.exp===v?'on':''}" onclick="S.abc.exp='${v}';render()">${v}</span>`).join('')}</div><div class="sl">MV:</div><div class="rg" style="margin-bottom:8px">${['Presente e Simétrico','Reduzido','Abolido'].map(v=>`<span class="ro ${a.mv===v?'on':''}" onclick="S.abc.mv='${v}';render()">${v}</span>`).join('')}</div><div class="sl">Ruídos:</div><div class="tags" style="margin-bottom:8px">${['Crépitos','Sibilos','Roncos','Atrito pleural'].map(v=>`<span class="tag ${a.rud.includes(v)?'on':''}" onclick="ts(S.abc.rud,'${v}')">${v}</span>`).join('')}</div><div class="sl">Esforço:</div><div class="tags">${['Taquipneia','Dispneia','Uso musc. acessória','Respiração paradoxal'].map(v=>`<span class="tag ${a.esf.includes(v)?'on':''}" onclick="ts(S.abc.esf,'${v}')">${v}</span>`).join('')}</div></div></div><div class="abcs"><div class="abch" onclick="tog('sc')"><strong>C</strong> — Circulação <i class="ti ti-chevron-down" style="margin-left:auto" aria-hidden="true"></i></div><div class="abcb open" id="sc"><div class="sl">TEC:</div><div class="rg" style="margin-bottom:8px">${['< 3s','> 3s','> 5s','Em flush'].map(v=>`<span class="ro ${a.tec===v?'on':''}" onclick="S.abc.tec='${v}';render()">${v}</span>`).join('')}</div><div class="sl">Ausculta:</div><div class="tags" style="margin-bottom:8px">${['Regular','Irregular','Reduzida','Sopro','Bulhas hipofonéticas'].map(v=>`<span class="tag ${a.aus.includes(v)?'on':''}" onclick="ts(S.abc.aus,'${v}')">${v}</span>`).join('')}</div><div class="sl">Pulsos:</div><div class="rg" style="margin-bottom:8px">${['Simétricos','Assimétricos','Filiformes','Ausentes'].map(v=>`<span class="ro ${a.pul===v?'on':''}" onclick="S.abc.pul='${v}';render()">${v}</span>`).join('')}</div><div class="sl">Abdome:</div><div class="tags">${['Flácido','Dor à palpação','Defesa','Descompressão dolorosa','Distendido','Ruídos abolidos'].map(v=>`<span class="tag ${a.abd.includes(v)?'on':''}" onclick="ts(S.abc.abd,'${v}')">${v}</span>`).join('')}</div>${(a.tec==='> 5s'||a.pul==='Filiformes'||a.pul==='Ausentes')?`<div class="abox ad" style="margin-top:8px"><i class="ti ti-alert-circle" aria-hidden="true"></i> Sinais de choque — ressuscitação imediata</div>`:''}</div></div><div class="abcs"><div class="abch" onclick="tog('sd')"><strong>D</strong> — Neurológico (GCS: ${g}/15) <i class="ti ti-chevron-down" style="margin-left:auto" aria-hidden="true"></i></div><div class="abcb open" id="sd"><div class="gcsg"><div class="gcsc"><label>Ab. Ocular</label><select onchange="S.abc.ao=+this.value;render()"><option value="4" ${a.ao==4?'selected':''}>4-Espontânea</option><option value="3" ${a.ao==3?'selected':''}>3-Comando</option><option value="2" ${a.ao==2?'selected':''}>2-Dor</option><option value="1" ${a.ao==1?'selected':''}>1-Ausente</option></select></div><div class="gcsc"><label>R. Verbal</label><select onchange="S.abc.rv=+this.value;render()"><option value="5" ${a.rv==5?'selected':''}>5-Orientado</option><option value="4" ${a.rv==4?'selected':''}>4-Confuso</option><option value="3" ${a.rv==3?'selected':''}>3-Palavras</option><option value="2" ${a.rv==2?'selected':''}>2-Sons</option><option value="1" ${a.rv==1?'selected':''}>1-Ausente</option></select></div><div class="gcsc"><label>R. Motora</label><select onchange="S.abc.rm=+this.value;render()"><option value="6" ${a.rm==6?'selected':''}>6-Obedece</option><option value="5" ${a.rm==5?'selected':''}>5-Localiza</option><option value="4" ${a.rm==4?'selected':''}>4-Flex.N</option><option value="3" ${a.rm==3?'selected':''}>3-Flex.A</option><option value="2" ${a.rm==2?'selected':''}>2-Extensão</option><option value="1" ${a.rm==1?'selected':''}>1-Ausente</option></select></div></div><div class="gcst"><small style="color:var(--color-text-secondary)">Glasgow Coma Scale</small><div class="big">${g}/15</div><div style="margin-top:3px"><span class="sb ${gcsC(g)}">${gcsL(g)}</span></div></div>${g<=8?`<div class="abox ad"><i class="ti ti-alert-circle" aria-hidden="true"></i> GCS ≤ 8 — considerar IOT e proteção de VA</div>`:''}<div class="sl">Pupilas:</div><div class="rg" style="margin-bottom:8px">${['Isocóricas e Reativas','Anisocóricas','Midriáticas','Mióticas','Não reagentes'].map(v=>`<span class="ro ${a.pup===v?'on':''}" onclick="S.abc.pup='${v}';render()">${v}</span>`).join('')}</div><div class="sl">Déficits:</div><div class="tags">${['Hemiparesia','Hemihipoestesia','PF central','Disartria','Afasia','Ataxia'].map(v=>`<span class="tag ${a.def.includes(v)?'on':''}" onclick="ts(S.abc.def,'${v}')">${v}</span>`).join('')}</div></div></div><div class="abcs"><div class="abch" onclick="tog('se')"><strong>E</strong> — Exposição <i class="ti ti-chevron-down" style="margin-left:auto" aria-hidden="true"></i></div><div class="abcb open" id="se"><div class="sl">Edema MMII:</div><div class="rg" style="margin-bottom:8px">${['Ausente','Presente'].map(v=>`<span class="ro ${a.ede===v?'on':''}" onclick="S.abc.ede='${v}';render()">${v}</span>`).join('')}</div>${a.ede==='Presente'?`<div class="sl">Cacifo:</div><div class="rg" style="margin-bottom:8px">${['Com cacifo','Sem cacifo'].map(v=>`<span class="ro ${a.cac===v?'on':''}" onclick="S.abc.cac='${v}';render()">${v}</span>`).join('')}</div>`:''}<div class="sl">Pele:</div><div class="tags">${['Palidez','Frialdade','Icterícia','Cianose','Lesões','Petéquias','Equimoses'].map(v=>`<span class="tag ${a.pel.includes(v)?'on':''}" onclick="ts(S.abc.pel,'${v}')">${v}</span>`).join('')}</div></div></div>`;}
function s3(){return`<div class="card"><div class="st"><i class="ti ti-search" aria-hidden="true"></i> Tipo de exame físico</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem"><button class="xbtn ${S.ef==='amb'?'on':''}" onclick="S.ef='amb';render()"><i class="ti ti-walk" aria-hidden="true"></i> Ambulatorial</button><button class="xbtn ${S.ef==='crit'?'on':''}" onclick="S.ef='crit';render()"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Paciente crítico (ABCDE)</button></div></div>${S.ef==='amb'?`<div class="card"><div class="st">Padrão ambulatorial</div>${[['g','Geral'],['cv','AP Cardiovascular'],['re','AP Respiratório'],['ab','Abdome'],['ne','Neurológico'],['pe','Pele e MMII']].map(([k,l])=>`<div style="margin-bottom:10px"><label>${l}</label><input type="text" value="${S.amb[k]}" oninput="S.amb['${k}']=this.value" placeholder="${l}..."></div>`).join('')}</div>`:''}${S.ef==='crit'?`<div class="card"><div class="st">ABCDE — Avaliação primária</div>${abcH()}</div>`:''}${S.ef?`<div class="card"><div class="st"><i class="ti ti-activity" aria-hidden="true"></i> Complementares à beira leito</div><div class="r2"><div><label>POCUS</label><input type="text" value="${S.poc}" oninput="S.poc=this.value" placeholder="Achados do POCUS"></div><div><label>ECG</label><input type="text" value="${S.ecg}" oninput="S.ecg=this.value" placeholder="Ritmo, alterações"></div></div></div>`:''}<div class="nav"><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar</button>${S.ef?`<button class="btnp" onclick="nx()">Impressão / Conduta <i class="ti ti-arrow-right" aria-hidden="true"></i></button>`:''}</div>`;}

function rCSec(sid,sec){const pc=sec.it.filter((_,i)=>S.chk[sid+'_'+sec.id+'_'+i]==='pend').length;const dc=sec.it.filter((_,i)=>S.chk[sid+'_'+sec.id+'_'+i]==='done').length;return`<div class="csec"><div class="csh" onclick="tog('cs${sec.id}')"><span>${sec.t}</span><div style="display:flex;gap:5px;align-items:center">${dc?`<span class="sb sok" style="font-size:11px">${dc}✓</span>`:''}${pc?`<span class="sb smod" style="font-size:11px">${pc}⏳</span>`:''}<i class="ti ti-chevron-down" aria-hidden="true"></i></div></div><div class="csb open" id="cs${sec.id}">${sec.it.map((item,idx)=>{const k=sid+'_'+sec.id+'_'+idx;const cl=ccls(k);return`<div class="chk ${cl}" onclick="cyc('${k}')"><div class="cico"><i class="ti ${cico(k)}" aria-hidden="true"></i></div><div class="ctx">${item}</div></div>`;}).join('')}<div style="margin-top:8px"><label style="margin-bottom:3px;display:block;font-size:12px;color:var(--color-text-secondary)">Observações desta seção:</label><textarea style="min-height:45px;font-size:13px" placeholder="Particularidades do caso..." oninput="S.nts['${sid}_${sec.id}']=this.value">${S.nts[sid+'_'+sec.id]||''}</textarea></div></div></div>`;}

function s4(){const T=S.sind?CT[S.sind]:null;const pt=T?T.s.reduce((a,sec)=>a+sec.it.filter((_,i)=>S.chk[S.sind+'_'+sec.id+'_'+i]==='pend').length,0):0;return`<div class="card"><div class="st"><i class="ti ti-clipboard-check" aria-hidden="true"></i> Impressão clínica e síndrome</div><div style="margin-bottom:12px"><label>Impressão clínica livre</label><textarea oninput="S.imp=this.value" placeholder="Descreva sua impressão diagnóstica...">${S.imp}</textarea></div><div class="sl">Síndrome clínica principal:</div><div class="sgrid">${SLIST.map(s=>`<button class="xbtn ${S.sind===s.id?'on':''}" onclick="S.sind=S.sind==='${s.id}'?null:'${s.id}';S.chk={};S.nts={};render()">${s.l}</button>`).join('')}</div></div>${T?`<div class="card"><div class="st"><i class="ti ti-list-check" aria-hidden="true"></i> Conduta — ${T.l}</div><div class="ai" style="margin-bottom:10px;font-size:12px"><i class="ti ti-info-circle" aria-hidden="true"></i> Clique para ciclar: ✓ Realizado → ⏳ Pendente → Não selecionado</div>${pt?`<div class="psm"><span class="psml"><i class="ti ti-clock" aria-hidden="true"></i> Pendentes:</span>${T.s.map(sec=>{const n=sec.it.filter((_,i)=>S.chk[S.sind+'_'+sec.id+'_'+i]==='pend').length;return n?`<span class="psmb">${sec.t}: ${n}</span>`:''}).join('')}</div>`:''}<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">Baseado em: ESC 2023, AHA/ACC 2022, SSC 2021, EASL 2018, AHA/ASA 2019, ASSENT-3</div>${T.s.map(sec=>rCSec(S.sind,sec)).join('')}</div>`:''}${!T&&S.imp?'':''}<div class="nav"><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar</button><button class="btnp" onclick="nx()">Gerar relatório <i class="ti ti-file-text" aria-hidden="true"></i></button></div>`;}

function gRel(){
  const g=gcs(),isDT=S.queixa==='Dor torácica';
  let hda=`Paciente admitido(a) via ${S.orig}, com queixa de ${S.queixa}`;
  if(S.tempo)hda+=`, com início há ${S.tempo}`;
  if(isDT){if(S.dt.ini)hda+=`. Início ${S.dt.ini.toLowerCase()}`;if(S.caract.length)hda+=`. Dor de caráter ${S.caract.join(', ').toLowerCase()}`;if(S.dt.irr.length)hda+=`, com irradiação para ${S.dt.irr.join(', ').toLowerCase()}`;if(S.dt.pal)hda+=`. ${S.dt.pal==='Sim'?'Reproduzida':'Não reproduzida'} à palpação`;if(S.dt.sem)hda+=`. ${S.dt.sem==='Sim'?'Semelhante a evento cardíaco prévio':S.dt.sem==='Não'?'Não semelhante a evento prévio':'Sem evento cardíaco prévio'}`;if(S.dt.sin.length)hda+=`. Sintomas: ${S.dt.sin.join(', ').toLowerCase()}`;}
  else if(S.caract.length)hda+=`. ${S.caract.join(', ').toLowerCase()}`;
  hda+='.';
  let ef='';
  if(S.ef==='amb'){ef=`Geral: ${S.amb.g||'—'} | CV: ${S.amb.cv||'—'} | Resp: ${S.amb.re||'—'} | Abd: ${S.amb.ab||'—'} | Neuro: ${S.amb.ne||'—'} | Pele: ${S.amb.pe||'—'}`;}
  else if(S.ef==='crit'){const a=S.abc;ef=`A: VA ${a.va.toLowerCase()}, fonação ${a.fon.toLowerCase()}. Colar: ${a.col.toLowerCase()}.\nB: Expansibilidade ${a.exp.toLowerCase()}, MV ${a.mv.toLowerCase()}. ${a.esf.join(', ')||'—'}. Ruídos: ${a.rud.join(', ')||'ausentes'}.\nC: TEC ${a.tec}. ${a.aus.join(', ')||'—'}. Pulsos ${a.pul.toLowerCase()}. Abdome: ${a.abd.join(', ')||'—'}.\nD: GCS ${g}/15 (O:${a.ao} V:${a.rv} M:${a.rm}) — ${gcsL(g)}. Pupilas ${a.pup.toLowerCase()}. Déficits: ${a.def.join(', ')||'ausentes'}.\nE: Edema MMII ${a.ede.toLowerCase()}${a.ede==='Presente'?' ('+a.cac.toLowerCase()+')':''}. Pele: ${a.pel.join(', ')||'sem alterações'}.`;}
  let sc='';
  if(isDT){sc=`\n${'='.repeat(40)}\nSCORES PREDITIVOS\nHEAR: ${hSc()}/10 — ${hI(hSc())}\nEDACS: ${eSc()} pts — ${eI()}${S.edacs.t0||S.edacs.t2?'\n  Troponina 0h: '+(S.edacs.t0||'—')+' | 2h: '+(S.edacs.t2||'—'):''}`;}
  let ct='';
  const T=S.sind?CT[S.sind]:null;
  if(T){
    const pd=[],dn=[];
    T.s.forEach(sec=>{
      const pi=sec.it.filter((_,i)=>S.chk[S.sind+'_'+sec.id+'_'+i]==='pend');
      const di=sec.it.filter((_,i)=>S.chk[S.sind+'_'+sec.id+'_'+i]==='done');
      const nt=S.nts[S.sind+'_'+sec.id]||'';
      if(pi.length)pd.push({t:sec.t,it:pi,nt});
      if(di.length)dn.push({t:sec.t,it:di,nt});
    });
    ct=`\n${'='.repeat(40)}\nIMPRESSÃO E CONDUTA\nSíndrome: ${T.l}`;
    if(S.imp)ct+=`\nImpressão: ${S.imp}`;
    if(pd.length){ct+=`\n\n⏳ PENDENTES:`;pd.forEach(s=>{ct+=`\n${s.t.toUpperCase()}:\n`+s.it.map(x=>`  - ${x}`).join('\n');if(s.nt)ct+=`\n  Obs: ${s.nt}`;});}
    if(dn.length){ct+=`\n\n✓ REALIZADAS:`;dn.forEach(s=>{ct+=`\n${s.t.toUpperCase()}:\n`+s.it.map(x=>`  - ${x}`).join('\n');});}
  }else if(S.imp)ct=`\n${'='.repeat(40)}\nIMPRESSÃO CLÍNICA\n${S.imp}`;
  const va=vA();
  return`## ADMISSÃO EM SALA DE EMERGÊNCIA ##\n${'='.repeat(40)}\nNome: ${S.nome||'Não informado'} | Idade: ${S.idade} anos | Origem: ${S.orig}\n${'='.repeat(40)}\nHDA\n${hda}\n${'='.repeat(40)}\nANTECEDENTES\nHPP: ${S.hpp.join(', ')||'Nega'} | MUC: ${S.muc||'Nega'} | Alergias: ${S.ale}\n${'='.repeat(40)}\nSINAIS VITAIS\nFC: ${S.fc||'—'} | SatO2: ${S.sat||'—'}% | PA: ${S.pa||'—'} | FR: ${S.fr||'—'} irpm | Gli: ${S.gli||'—'} mg/dL${va.length?'\n⚠ ALERTAS: '+va.join(' | '):''}\n${'='.repeat(40)}\nEXAME FÍSICO (${S.ef==='amb'?'Ambulatorial':S.ef==='crit'?'Crítico ABCDE':'não selecionado'})\n${ef}${sc}${ct}\n${'='.repeat(40)}\nCOMPLEMENTARES\nPOCUS: ${S.poc||'Não realizado'} | ECG: ${S.ecg||'Não realizado'}\n${'='.repeat(40)}`;}

function pSumH(){const T=S.sind?CT[S.sind]:null;if(!T)return'';const pd=T.s.filter(sec=>sec.it.some((_,i)=>S.chk[S.sind+'_'+sec.id+'_'+i]==='pend'));if(!pd.length)return'';return`<div class="psm" style="margin-bottom:12px"><span class="psml"><i class="ti ti-clock" aria-hidden="true"></i> Pendências:</span>${pd.map(s=>{const n=s.it.filter((_,i)=>S.chk[S.sind+'_'+s.id+'_'+i]==='pend').length;return`<span class="psmb">${s.t}: ${n}</span>`;}).join('')}</div>`;}

function s5(){const rel=gRel();return`<div class="card"><div class="st"><i class="ti ti-file-text" aria-hidden="true"></i> Relatório de admissão</div>${pSumH()}<div class="relbox" id="relTxt">${rel}</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btng" onclick="navigator.clipboard.writeText(document.getElementById('relTxt').innerText).then(()=>showToast('Copiado!'))"><i class="ti ti-copy" aria-hidden="true"></i> Copiar</button><button class="btng" style="background:#185fa5" onclick="saveReport(document.getElementById('relTxt').innerText)"><i class="ti ti-device-floppy" aria-hidden="true"></i> Salvar</button><button class="btns" onclick="showSaved()"><i class="ti ti-history" aria-hidden="true"></i> Ver salvos</button><button class="btns" onclick="pv()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Editar</button></div></div>`;}

function render(){rs();const c=document.getElementById('con');if(S.step===0)c.innerHTML=s0();else if(S.step===1)c.innerHTML=s1();else if(S.step===2)c.innerHTML=s2();else if(S.step===3)c.innerHTML=s3();else if(S.step===4)c.innerHTML=s4();else c.innerHTML=s5();}
initAuth();
</script>
</body>
</html>
